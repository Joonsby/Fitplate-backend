name: Deploy Fitplate Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

run-name: Deploy main backend

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, fitplate-prod]

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync prod source
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude '.gradle' \
            ./ /home/ubuntu/deploy/prod/fitplate-backend/

      - name: Deploy prod
        working-directory: /home/ubuntu/deploy/prod/fitplate-backend
        run: |
          docker compose --env-file /home/ubuntu/config/fitplate-prod.env -f docker-compose.prod.yml up -d --build
          docker ps
          sleep 10
          docker logs --tail=50 fitplate-backend-prod