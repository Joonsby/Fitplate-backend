name: Deploy Fitplate Backend

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "배포할 브랜치를 선택하세요."
        required: true
        default: dev
        type: choice
        options:
          - dev
          - main

run-name: Deploy ${{ inputs.target_branch }} backend

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, fitplate-prod]

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Deploy dev
        if: ${{ inputs.target_branch == 'dev' }}
        run: |          
          docker compose --env-file /home/ubuntu/config/fitplate-dev.env -f docker-compose.dev.yml up -d --build
          docker ps

      - name: Deploy prod
        if: ${{ inputs.target_branch == 'main' }}
        run: |
          docker compose --env-file /home/ubuntu/config/fitplate-prod.env -f docker-compose.prod.yml up -d --build
          docker ps