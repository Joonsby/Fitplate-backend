services:
  mysql-dev:
    image: mysql:8.0
    container_name: fitplate-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: fitplate_dev
      MYSQL_USER: fitplate_dev_user
      MYSQL_PASSWORD: fitplate_dev
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-dev:
    build: .
    container_name: fitplate-backend-dev
    restart: always
    depends_on:
      - mysql-dev
    ports:
      - "8081:8080"
    env_file:
      - /home/ubuntu/config/fitplate-dev.env
    
volumes:
  mysql_dev_data: