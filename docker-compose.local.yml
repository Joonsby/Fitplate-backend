services:
  mysql-local:
    image: mysql:8.0
    container_name: fitplate-mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fitplate_local
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql

  nginx-local:
    image: nginx:alpine
    container_name: fitplate-nginx-local
    restart: "no"
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf    

volumes:
  mysql_local_data: