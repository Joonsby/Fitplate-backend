services:
  mysql-local:
    image: mysql:8.0
    container_name: fitplate-mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: fitplate_local
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-local:
    build: .
    container_name: fitplate-backend-local
    restart: "no"
    depends_on:
      - mysql-local
    environment:
      DB_URL: jdbc:mysql://mysql-local:3306/fitplate_local
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TOSS_MTLS_CERT_PASSWORD: ${TOSS_MTLS_CERT_PASSWORD}
    ports:
      - "8081:8080"

volumes:
  mysql_local_data: