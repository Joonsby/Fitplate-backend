services:
  mysql:
    image: mysql:8.0
    container_name: fitplate-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: fitplate_prod
      MYSQL_USER: fitplate_prod_user
      MYSQL_PASSWORD: fitplate_prod
    volumes:
      - mysql_prod_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fitplate_prod_user", "-pfitplate_prod"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: fitplate-backend-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - /home/ubuntu/config/fitplate-prod.env
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: fitplate-nginx-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/certs/fitplate:/etc/nginx/certs:ro

volumes:
  mysql_prod_data: