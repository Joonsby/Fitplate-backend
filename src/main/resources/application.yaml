spring:
  application:
    name: fitplate-api

  jackson:
    time-zone: Asia/Seoul

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-3.5-flash

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4.1-mini

server:
  port: ${SERVER_PORT:8080}

toss:
  api:
    base-url: https://apps-in-toss-api.toss.im
  mtls:
    cert-path: ${TOSS_MTLS_CERT_PATH:classpath:certs/fitplate-sandbox-mtls.p12}
    cert-password: ${TOSS_MTLS_CERT_PASSWORD}